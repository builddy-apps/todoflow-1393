<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraList - Task Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'monospace'],
                    },
                    colors: {
                        primary: {
                            50: '#fffbeb',
                            100: '#fef3c7',
                            200: '#fde68a',
                            300: '#fcd34d',
                            400: '#fbbf24',
                            500: '#f59e0b',
                            600: '#d97706',
                            700: '#b45309',
                            800: '#92400e',
                            900: '#78350f',
                            950: '#451a03',
                        },
                        dark: {
                            surface: '#0f172a',
                            elevated: '#1e293b',
                            border: '#334155',
                        }
                    },
                    animation: {
                        'slide-in': 'slideIn 0.3s ease-out forwards',
                        'slide-out': 'slideOut 0.3s ease-in forwards',
                        'fade-in': 'fadeIn 0.4s ease-out forwards',
                        'check-pop': 'checkPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                        'strike': 'strike 0.25s ease-out forwards',
                        'celebrate': 'celebrate 0.5s ease-out forwards',
                        'confetti-burst': 'confettiBurst 0.6s ease-out forwards',
                        'shimmer': 'shimmer 1.5s infinite',
                    },
                    keyframes: {
                        slideIn: {
                            '0%': { opacity: '0', transform: 'translateX(-20px)' },
                            '100%': { opacity: '1', transform: 'translateX(0)' },
                        },
                        slideOut: {
                            '0%': { opacity: '1', transform: 'translateX(0)' },
                            '100%': { opacity: '0', transform: 'translateX(20px)' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(8px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        checkPop: {
                            '0%': { transform: 'scale(1)' },
                            '50%': { transform: 'scale(1.3)' },
                            '100%': { transform: 'scale(1)' },
                        },
                        strike: {
                            '0%': { width: '0' },
                            '100%': { width: '100%' },
                        },
                        celebrate: {
                            '0%, 100%': { transform: 'scale(1)' },
                            '50%': { transform: 'scale(1.05)' },
                        },
                        confettiBurst: {
                            '0%': { transform: 'scale(0) rotate(0deg)', opacity: '1' },
                            '100%': { transform: 'scale(1.5) rotate(720deg)', opacity: '0' },
                        },
                        shimmer: {
                            '0%': { backgroundPosition: '-200% 0' },
                            '100%': { backgroundPosition: '200% 0' },
                        },
                    }
                }
            }
        }
    </script>
    <style>
        .stagger-1 { animation-delay: 0.05s; opacity: 0; }
        .stagger-2 { animation-delay: 0.1s; opacity: 0; }
        .stagger-3 { animation-delay: 0.15s; opacity: 0; }
        .stagger-4 { animation-delay: 0.2s; opacity: 0; }
        .stagger-5 { animation-delay: 0.25s; opacity: 0; }
        .dragging { opacity: 0.5; transform: scale(1.02); }
        .drag-over { border-top: 2px solid #f59e0b; }
    </style>
</head>
<body class="min-h-screen bg-slate-50 dark:bg-dark-surface transition-colors duration-300">
    <!-- Header -->
    <header class="sticky top-0 z-40 border-b border-slate-200 dark:border-dark-border bg-white/80 dark:bg-dark-elevated/80 backdrop-blur-md">
        <div class="mx-auto max-w-6xl flex items-center justify-between px-4 h-16">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-primary-400 to-primary-600 flex items-center justify-center shadow-lg shadow-primary-500/25">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
                    </svg>
                </div>
                <h1 class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">AuraList</h1>
            </div>
            <button onclick="AppUtils.toggleDark()" class="p-2.5 rounded-xl text-slate-500 hover:text-slate-900 dark:hover:text-white hover:bg-slate-100 dark:hover:bg-dark-border transition-all duration-200 focus:ring-2 focus:ring-primary-500 focus:outline-none" aria-label="Toggle dark mode">
                <svg class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                </svg>
                <svg class="w-5 h-5 dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="mx-auto max-w-6xl px-4 py-8">
        <!-- Progress Section -->
        <div class="mb-8 animate-fade-in">
            <div class="flex items-center justify-between mb-2">
                <h2 class="text-2xl font-bold text-slate-900 dark:text-white">Your Tasks</h2>
                <span id="progress-text" class="text-sm font-medium text-slate-500 dark:text-slate-400">0% complete</span>
            </div>
            <div class="h-2 bg-slate-200 dark:bg-dark-border rounded-full overflow-hidden">
                <div id="progress-bar" class="h-full bg-gradient-to-r from-primary-500 to-primary-400 rounded-full transition-all duration-500 ease-out" style="width: 0%"></div>
            </div>
        </div>

        <!-- Task Input -->
        <div class="mb-6 animate-fade-in stagger-1">
            <div class="relative">
                <input 
                    type="text" 
                    id="task-input" 
                    placeholder="Add a new task..." 
                    class="w-full px-5 py-4 rounded-2xl border-2 border-slate-200 dark:border-dark-border bg-white dark:bg-dark-elevated text-base text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:border-primary-500 focus:ring-4 focus:ring-primary-500/10 transition-all duration-200 shadow-sm"
                    autocomplete="off"
                >
                <div class="absolute right-4 top-1/2 -translate-y-1/2 flex items-center gap-2">
                    <span class="hidden sm:inline-flex items-center gap-1.5 px-2.5 py-1 rounded-lg bg-slate-100 dark:bg-dark-border text-xs text-slate-500 dark:text-slate-400">
                        <kbd class="font-mono">Enter</kbd>
                        <span>to add</span>
                    </span>
                    <button 
                        id="add-btn" 
                        onclick="window.TodoApp.addTask()" 
                        class="p-2 rounded-xl bg-primary-500 hover:bg-primary-600 text-white shadow-lg shadow-primary-500/25 transition-all duration-200 hover:scale-105 active:scale-95 focus:ring-2 focus:ring-primary-500 focus:outline-none"
                        aria-label="Add task"
                    >
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Filter Tabs -->
        <div class="flex items-center gap-1.5 mb-6 p-1 bg-slate-100 dark:bg-dark-border rounded-xl w-fit animate-fade-in stagger-2">
            <button onclick="window.TodoApp.setFilter('all')" data-filter="all" class="filter-btn px-4 py-2 rounded-lg text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-primary-500">
                All
            </button>
            <button onclick="window.TodoApp.setFilter('active')" data-filter="active" class="filter-btn px-4 py-2 rounded-lg text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-primary-500">
                Active
            </button>
            <button onclick="window.TodoApp.setFilter('completed')" data-filter="completed" class="filter-btn px-4 py-2 rounded-lg text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-primary-500">
                Completed
            </button>
        </div>

        <!-- Task List -->
        <div id="task-list" class="space-y-3 min-h-[200px] animate-fade-in stagger-3">
            <!-- Tasks will be rendered here -->
            <div id="empty-state" class="flex flex-col items-center justify-center py-16 px-4">
                <div class="w-20 h-20 rounded-2xl bg-slate-100 dark:bg-dark-border flex items-center justify-center mb-4">
                    <svg class="w-10 h-10 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                    </svg>
                </div>
                <h3 class="text-lg font-semibold text-slate-900 dark:text-white">No tasks yet</h3>
                <p class="text-sm text-slate-500 dark:text-slate-400 mt-1 text-center max-w-sm">Add your first task to get started. Press Enter to add quickly.</p>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loading-state" class="hidden space-y-3">
            <div class="h-16 bg-slate-200 dark:bg-dark-border rounded-xl animate-pulse"></div>
            <div class="h-16 bg-slate-200 dark:bg-dark-border rounded-xl animate-pulse"></div>
            <div class="h-16 bg-slate-200 dark:bg-dark-border rounded-xl animate-pulse"></div>
        </div>

        <!-- Footer -->
        <div id="footer" class="mt-8 flex items-center justify-between animate-fade-in stagger-4 hidden">
            <p id="task-count" class="text-sm text-slate-500 dark:text-slate-400">
                <span id="active-count">0</span> tasks remaining
            </p>
            <button 
                onclick="window.TodoApp.clearCompleted()" 
                class="px-4 py-2 text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-red-600 dark:hover:text-red-400 hover:bg-red-50 dark:hover:bg-red-950/30 rounded-lg transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-red-500"
            >
                Clear Completed
            </button>
        </div>
    </main>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2"></div>

    <!-- Confetti Container -->
    <div id="confetti-container" class="fixed inset-0 pointer-events-none z-50 overflow-hidden"></div>

    <!-- Scripts -->
    <script src="app.js"></script>
    <script src="todo.js"></script>
</body>
</html>
